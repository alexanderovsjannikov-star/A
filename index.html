<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Zeitfenster</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Zeitfenster">

    <style>
        :root {
            --bg-color: #090a0f;
            --card-bg: #141722;
            --text-color: #ffffff;
            --text-secondary: #8a8f9e;
            --primary-color: #3b82f6;
            --progress-bg: #222738;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
            padding-bottom: env(safe-area-inset-bottom); /* iOS Home-Indikator Beachtung */
        }

        .container {
            background-color: var(--card-bg);
            border-radius: 24px;
            padding: 30px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 25px;
            font-weight: 600;
        }

        .input-group {
            display: flex;
            justify-content: space-between;
            gap: 15px;
            margin-bottom: 30px;
        }

        .input-box {
            flex: 1;
            text-align: left;
        }

        label {
            display: block;
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input[type="time"] {
            width: 100%;
            padding: 12px;
            background-color: var(--progress-bg);
            border: 2px solid transparent;
            border-radius: 12px;
            color: var(--text-color);
            font-size: 1.1rem;
            font-weight: 600;
            outline: none;
            box-sizing: border-box;
            -webkit-appearance: none;
        }

        input[type="time"]:focus {
            border-color: var(--primary-color);
        }

        .visual-area {
            margin: 40px 0 20px 0;
        }

        .percentage {
            font-size: 3.5rem;
            font-weight: 700;
            margin-bottom: 10px;
            font-variant-numeric: tabular-nums;
        }

        .progress-bar-container {
            width: 100%;
            height: 24px;
            background-color: var(--progress-bg);
            border-radius: 12px;
            overflow: hidden;
            position: relative;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #3b82f6, #60a5fa);
            border-radius: 12px;
            transition: width 0.2s linear; /* Schnellere Transition für Sekunden-Updates */
        }

        .status-text {
            margin-top: 15px;
            font-size: 0.95rem;
            font-weight: 500;
            color: var(--text-secondary);
            min-height: 20px;
            font-variant-numeric: tabular-nums; /* Verhindert das Springen von Zahlen */
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Zeitfenster-Fortschritt</h1>
    
    <div class="input-group">
        <div class="input-box">
            <label for="startTime">Startzeit</label>
            <input type="time" id="startTime" value="06:00">
        </div>
        <div class="input-box">
            <label for="endTime">Endzeit</label>
            <input type="time" id="endTime" value="23:00">
        </div>
    </div>

    <div class="visual-area">
        <div class="percentage" id="percentageText">0.0%</div>
        <div class="progress-bar-container">
            <div class="progress-bar" id="progressBar"></div>
        </div>
        <div class="status-text" id="statusText">Lade...</div>
    </div>
</div>

<script>
    const startInput = document.getElementById('startTime');
    const endInput = document.getElementById('endTime');
    const percentageText = document.getElementById('percentageText');
    const progressBar = document.getElementById('progressBar');
    const statusText = document.getElementById('statusText');

    function timeToSeconds(timeStr) {
        const [hours, minutes] = timeStr.split(':').map(Number);
        return hours * 3600 + minutes * 60;
    }

    function formatRemainingTime(totalSeconds) {
        const hours = Math.floor(totalSeconds / 3600);
        const minutes = Math.floor((totalSeconds % 3600) / 60);
        const seconds = totalSeconds % 60;

        let result = "Noch ";
        if (hours > 0) result += `${hours} Std. `;
        if (hours > 0 || minutes > 0) result += `${minutes} Min. `;
        result += `${seconds} Sek. übrig`;
        
        return result;
    }

    function updateTimer() {
        const now = new Date();
        const currentSeconds = now.getHours() * 3600 + now.getMinutes() * 60 + now.getSeconds();
        
        const startSeconds = timeToSeconds(startInput.value);
        let endSeconds = timeToSeconds(endInput.value);

        // Tageswechsel-Logik (z.B. 23:00 bis 01:00)
        if (endSeconds < startSeconds) {
            endSeconds += 24 * 3600;
        }

        const totalDuration = endSeconds - startSeconds;
        
        if (totalDuration <= 0) {
            percentageText.innerText = "0.0%";
            progressBar.style.width = "0%";
            statusText.innerText = "Ungültiges Zeitfenster";
            return;
        }

        let elapsed = currentSeconds - startSeconds;
        
        if (currentSeconds < startSeconds && endSeconds > 24 * 3600) {
            elapsed = (currentSeconds + 24 * 3600) - startSeconds;
        }

        let percentage = (elapsed / totalDuration) * 100;

        if (percentage < 0) {
            percentage = 0;
            statusText.innerText = "Zeitfenster hat noch nicht begonnen";
        } else if (percentage >= 100) {
            percentage = 100;
            statusText.innerText = "Zeitfenster ist beendet";
        } else {
            const secondsLeft = Math.ceil(endSeconds - (startSeconds + elapsed));
            statusText.innerText = formatRemainingTime(secondsLeft);
        }

        // Genau eine Nachkommastelle erzwingen (.toFixed(1))
        percentageText.innerText = percentage.toFixed(1) + "%";
        progressBar.style.width = percentage + "%";
    }

    startInput.addEventListener('input', updateTimer);
    endInput.addEventListener('input', updateTimer);

    // Initiales Update direkt ausführen
    updateTimer();
    
    // Präzises Update jede Sekunde
    setInterval(updateTimer, 1000);
</script>

</body>
</html>
