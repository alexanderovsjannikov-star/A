<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Zeitfenster</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Zeitfenster">

    <style>
        :root {
            --bg-color: #090a0f;
            --card-bg: #141722;
            --text-color: #ffffff;
            --text-secondary: #8a8f9e;
            --primary-color: #3b82f6;
            --progress-bg: #222738;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
            padding-bottom: env(safe-area-inset-bottom);
        }

        .container {
            background-color: var(--card-bg);
            border-radius: 24px;
            padding: 30px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        /* Überschrift wurde komplett entfernt */

        .input-group {
            display: flex;
            justify-content: space-between;
            gap: 15px;
            margin-bottom: 25px;
        }

        .input-box {
            flex: 1;
            text-align: center;
        }

        label {
            display: block;
            font-size: 0.7rem; /* Etwas kleiner */
            color: var(--text-secondary);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input[type="time"] {
            width: 90%;
            padding: 8px 10px; /* Kompakter */
            background-color: var(--progress-bg);
            border: 2px solid transparent;
            border-radius: 10px;
            color: var(--text-color);
            font-size: 0.95rem; /* Zeit-Eingabe verkleinert */
            font-weight: 600;
            outline: none;
            box-sizing: border-box;
            text-align: center;
            -webkit-appearance: none;
        }

        input[type="time"]:focus {
            border-color: var(--primary-color);
        }

        .visual-area {
            margin: 30px 0 10px 0;
        }

        .percentage {
            font-size: 3.5rem;
            font-weight: 700;
            margin-bottom: 15px;
            font-variant-numeric: tabular-nums;
        }

        .progress-bar-container {
            width: 100%;
            height: 24px;
            background-color: var(--progress-bg);
            border-radius: 12px;
            overflow: hidden;
            position: relative;
            margin-bottom: 25px;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #3b82f6, #60a5fa);
            border-radius: 12px;
            transition: width 0.5s ease; /* Zurück auf flüssigere Animation, da keine Sekunden-Sprünge mehr */
        }

        .status-text {
            font-size: 1.1rem; /* Größer für Vergangen/Noch */
            font-weight: 600;
            color: var(--text-color); /* Hellerer Text für bessere Lesbarkeit */
            min-height: 60px;
            line-height: 1.6;
            font-variant-numeric: tabular-nums;
            text-align: left; /* Linksbündig für saubere Ausrichtung der Label */
            max-width: 280px;
            margin: 0 auto;
        }
        
        .status-line {
            display: flex;
            justify-content: space-between; /* Trennt Text links und Zeit rechts */
            margin: 4px 0;
        }

        .status-label {
            color: var(--text-secondary); /* "Vergangen:" und "Noch:" in dezentem Grau */
            font-weight: 500;
        }

        .status-value {
            color: var(--text-color); /* Die eigentlichen Zeiten in Weiß */
        }
    </style>
</head>
<body>

<div class="container">
    <div class="input-group">
        <div class="input-box">
            <label for="startTime">Startzeit</label>
            <input type="time" id="startTime" value="06:00">
        </div>
        <div class="input-box">
            <label for="endTime">Endzeit</label>
            <input type="time" id="endTime" value="23:00">
        </div>
    </div>

    <div class="visual-area">
        <div class="percentage" id="percentageText">0.0%</div>
        <div class="progress-bar-container">
            <div class="progress-bar" id="progressBar"></div>
        </div>
        <div class="status-text" id="statusText">Lade...</div>
    </div>
</div>

<script>
    const startInput = document.getElementById('startTime');
    const endInput = document.getElementById('endTime');
    const percentageText = document.getElementById('percentageText');
    const progressBar = document.getElementById('progressBar');
    const statusText = document.getElementById('statusText');

    function timeToSeconds(timeStr) {
        const [hours, minutes] = timeStr.split(':').map(Number);
        return hours * 3600 + minutes * 60;
    }

    // ÄNDERUNG: Formatiert jetzt nur noch Std. und Min. (Sekunden entfernt)
    function formatTimeString(totalSeconds) {
        const hours = Math.floor(totalSeconds / 3600);
        const minutes = Math.floor((totalSeconds % 3600) / 60);

        let result = "";
        if (hours > 0) result += `${hours} Std. `;
        result += `${minutes} Min.`;
        return result;
    }

    function updateTimer() {
        const now = new Date();
        const currentSeconds = now.getHours() * 3600 + now.getMinutes() * 60 + now.getSeconds();
        
        const startSeconds = timeToSeconds(startInput.value);
        let endSeconds = timeToSeconds(endInput.value);

        if (endSeconds < startSeconds) {
            endSeconds += 24 * 3600;
        }

        const totalDuration = endSeconds - startSeconds;
        
        if (totalDuration <= 0) {
            percentageText.innerText = "0.0%";
            progressBar.style.width = "0%";
            statusText.innerText = "Ungültiges Zeitfenster";
            return;
        }

        let elapsed = currentSeconds - startSeconds;
        
        if (currentSeconds < startSeconds && endSeconds > 24 * 3600) {
            elapsed = (currentSeconds + 24 * 3600) - startSeconds;
        }

        let percentage = (elapsed / totalDuration) * 100;

        if (percentage < 0) {
            percentage = 0;
            progressBar.style.width = "0%";
            statusText.innerText = "Zeitfenster hat noch nicht begonnen";
        } else if (percentage >= 100) {
            percentage = 100;
            progressBar.style.width = "100%";
            statusText.innerHTML = `
                <div class="status-line">
                    <span class="status-label">Vergangen:</span> 
                    <span class="status-value">${formatTimeString(totalDuration)}</span>
                </div>
                <div class="status-line" style="justify-content: center; color: var(--text-secondary); font-size: 0.9rem; margin-top: 8px;">
                    Zeitfenster ist beendet
                </div>`;
        } else {
            const secondsLeft = Math.ceil(endSeconds - (startSeconds + elapsed));
            const elapsedSeconds = Math.floor(elapsed);
            
            // ÄNDERUNG: Wunderschöne, linksbündige Struktur mit "Vergangen:" und "Noch:" links und den Zeiten rechts
            statusText.innerHTML = `
                <div class="status-line">
                    <span class="status-label">Vergangen:</span> 
                    <span class="status-value">${formatTimeString(elapsedSeconds)}</span>
                </div>
                <div class="status-line">
                    <span class="status-label">Noch:</span> 
                    <span class="status-value">${formatTimeString(secondsLeft)}</span>
                </div>`;
        }

        percentageText.innerText = percentage.toFixed(1) + "%";
        progressBar.style.width = percentage + "%";
    }

    startInput.addEventListener('input', updateTimer);
    endInput.addEventListener('input', updateTimer);

    updateTimer();
    // Aktualisiert alle 5 Sekunden (reicht völlig ohne die Sekundenanzeige und spart Akku)
    setInterval(updateTimer, 5000);
</script>

</body>
</html>
